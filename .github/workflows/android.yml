name: Android CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Configure release signing
        run: |
          # 1. Decode keystore
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/play-store-keystore.jks

          # 2. Create signing.gradle with release signing config
          cat > android/app/signing.gradle << 'EOF'
          android.signingConfigs.release {
              storeFile file('play-store-keystore.jks')
              storePassword System.getenv("KEYSTORE_PASSWORD")
              keyAlias System.getenv("KEYSTORE_ALIAS")
              keyPassword System.getenv("KEYSTORE_KEY_PASSWORD")
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          EOF

          # 3. Inject apply from: 'signing.gradle' into app/build.gradle after apply plugin line
          sed -i "s/apply plugin: \"com.android.application\"/apply plugin: \"com.android.application\"\napply from: 'signing.gradle'/" android/app/build.gradle

          # 4. Inject async-storage local_repo into build.gradle
          sed -i "/maven { url 'https:\/\/www.jitpack.io' }/a\\    maven { url \"\$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo\" }" android/build.gradle

          # Verify
          echo "=== signing.gradle ===" && cat android/app/signing.gradle
          echo "=== signingConfigs in build.gradle ===" && grep -A 4 "signingConfigs" android/app/build.gradle | head -8

        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Set Android SDK path
        run: |
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Build release AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --console=plain 2>&1 | tail -30

      - name: Upload AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AI-Music-Player-release.aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 7
