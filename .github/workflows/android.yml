name: Android CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Set Android SDK path
        run: |
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -80

      - name: Find APK
        id: find-apk
        run: |
          find android -name "*.apk" -type f 2>/dev/null
          echo "apk_path=$(find android -name "*.apk" -type f | head -1)" >> $GITHUB_OUTPUT

      - name: Upload APK
        if: success() && steps.find-apk.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: AI-Music-Player-debug.apk
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 7
