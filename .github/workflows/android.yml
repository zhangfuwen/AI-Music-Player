name: Android CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Patch hermesCommand for linux
        run: |
          # Hardcode hermes path (line 14 has the node --print approach that fails in CI)
          sed -i '14s/.*/    hermesCommand = new File(rootDir, "\/home\/runner\/work\/AI-Music-Player\/AI-Music-Player\/node_modules\/react-native\/sdks\/hermesc\/linux64-bin\/hermesc").getAbsolutePath()/' android/app/build.gradle
          echo "=== hermesCommand after patch ==="
          grep -n "hermesCommand" android/app/build.gradle | head -5

      - name: Configure release signing
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/play-store-keystore.jks
          sed -i "/maven { url 'https:\/\/www.jitpack.io' }/a\\    maven { url \"\$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo\" }" android/build.gradle
          python3 scripts/configure-signing.py
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Set Android SDK path
        run: |
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --console=plain 2>&1 | tee /tmp/gradle.log
          echo "=== GRADLE EXIT: ${PIPESTATUS[0]} ==="
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Debug build error
        if: failure()
        run: |
          grep -E "error|Error|BUILD FAILED|What went wrong" /tmp/gradle.log | grep -v "DEBUG\|INFO\|LIFECYCLE" | head -10

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AI-Music-Player-release.apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
