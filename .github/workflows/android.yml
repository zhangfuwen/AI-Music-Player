name: Android CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Configure release signing
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/play-store-keystore.jks
          sed -i "/maven { url 'https:\/\/www.jitpack.io' }/a\\    maven { url \"\$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo\" }" android/build.gradle
          python3 scripts/configure-signing.py
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Set Android SDK path
        run: |
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Build release AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --console=plain \
            -PKEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
            -PKEYSTORE_ALIAS="$KEYSTORE_ALIAS" \
            -PKEYSTORE_KEY_PASSWORD="$KEYSTORE_KEY_PASSWORD" \
            2>&1 | tee /tmp/gradle.log
          echo "=== GRADLE EXIT: ${PIPESTATUS[0]} ==="

      - name: Debug JS bundling error
        if: failure()
        run: |
          grep -E "error|Error|BUILD FAILED|node" /tmp/gradle.log | grep -v "DEBUG\|INFO\|LIFECYCLE" | head -20

      - name: Upload AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AI-Music-Player-release.aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 7
